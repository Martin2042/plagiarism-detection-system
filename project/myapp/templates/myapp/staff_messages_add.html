{% extends 'myapp/staff_base.html' %}
{% load static %}
{% block title %}Add Message{% endblock %}
{% block body %}
<center>
    <h2><font color="#366092"> Add Message</font></h2>
<div class="container">
    <form name="frm" role="form" action="{% url 'staff_messages_add' %}" method="post">
            {% csrf_token %}
        <div class="form-group">
             <label for="sub">Subject</label>
             <input type="text"  class="form-control" id="sub" name="sub" placeholder="Enter subject" required="required"></input>
         </div>
        <div class="form-group">
             <label for="msg">Message</label>
             <textarea  class="form-control" id="msg" name="msg" placeholder="Enter message" required="required"></textarea>
         </div>
        <button type="submit" class="btn btn-info" id="bt" name="bt">Add</button>
        <button type="reset" class="btn btn-info" id="rt" name="rt">Reset</button>
    </form>
    {{msg}}
</div>
</center>
{% endblock %}
