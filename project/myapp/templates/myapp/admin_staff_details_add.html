{% extends 'myapp/admin_base.html' %}
{% load static %}
{% block title %}New Staff Registration{% endblock %}
{% block body %}
<center>
    <h2>New Staff Registration</h2>
	<div class="container">
    <form role="form" name="frm" action="{% url 'admin_staff_details_add' %}" method="post">
        {% csrf_token %}

        <div class="form-group">
			<label for="fname">Name</label>
	        <input class="form-control" type="text"  id="fname" name="fname" placeholder="First name" required="required">
			<input class="form-control" type="text"  id="lname" name="lname" placeholder="Last name" required="required">
		</div>
	    <div class="form-group">
			<label for="desg_id">Designation</label>
			<select  name="desg_id" id="desg_id" class="form-control" >
    			{% for designation_obj in designation_list%}
    			<option value="{{designation_obj.id}}">{{designation_obj.designation}}</option>
    			{% endfor %}
			</select>
		</div>
	    <div class="form-group">
			<label for="addr">Address</label>
	        <input class="form-control" type="text"  id="addr" name="addr" placeholder="Address" >
            <input type="text"  class="form-control" id="pin" name="pin" placeholder="pin" >
		</div>
	    <div class="form-group">
			<label for="contact">Contact</label>
	        <input type="text"  class="form-control" id="contact" name="contact" placeholder="Enter contact">
		</div>
		<div class="form-group">
			<label for="email">Email</label>
	        <input type="email" class="form-control" id="email" name="email" placeholder="Enter email id"></td>
		</div>
        <div class="form-group">
			<label for="pwd">password</label>
	        <input type="password" class="form-control" id="pwd" name="pwd"></td>
		</div>
		<br><br>
	    <button type="submit" class="btn btn-info" id="bt" name="bt">Register</button>
        <button type="reset" class="btn btn-info" id="rt" name="rt">Reset</button>
	    </table>
    </form>
	{{msg}}
	</div>
</center>
{% endblock %}
