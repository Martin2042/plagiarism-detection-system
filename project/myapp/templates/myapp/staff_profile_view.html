{% extends 'myapp/staff_base.html' %}
{% load static %}
{% block title %}Staff Details{% endblock %}
{% block body %}
<center>
    <h2>Staff Details</h2>
	<div class="container">
    <form role="form" name="frm"  method="get">
        {% csrf_token %}
		<div class="form-group">
			<label for="fname">Name</label>
	        <input class="form-control" type="text"
				   id="fname" name="fname" value="{{staff_obj.fname}}" required="required" disabled>
			<input class="form-control" type="text"
				   id="lname" name="lname" value="{{staff_obj.lname}}" required="required" disabled>
		</div>
	    <div class="form-group">
			<label for="desg_id">Designation</label>
			{% for desg_obj in desg_list%}
					{%if desg_obj.id == staff_obj.desg_id %}
    				<input class="form-control" type="text" id="desg_id" value="{{desg_obj.designation}}" disabled>
					{%endif%}
			{% endfor %}

		</div>
		<div class="form-group">
			<label for="addr">Address</label>
			<textarea class="form-control"
					  id="addr" name="addr" placeholder="Address" disabled>{{staff_obj.addr}}</textarea>
            <input type="text"  class="form-control"
				   id="pin" name="pin" value="{{staff_obj.pin}}" disabled>
		</div>
	    <div class="form-group">
			<label for="contact">Contact</label>
	        <input type="text"  class="form-control"
				   id="contact" name="contact" value="{{staff_obj.contact}}" disabled>
		</div>
		<div class="form-group">
			<label for="email">Email</label>
	        <input type="email" class="form-control"
				   id="email" name="email" value="{{staff_obj.email}}" disabled></td>
		</div>
        <br><br>



    </form>
	{{msg}}
	</div>
</center>

{% endblock %}
