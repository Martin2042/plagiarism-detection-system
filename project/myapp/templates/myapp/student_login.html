{% extends 'myapp/base.html' %}
{% load static %}
{% block title %}Student Login{% endblock %}
{% block body %}
<center>
     <h2><font color="#366092">Student Login</font></h2>
        <img src="{% static 'myapp/images/student.png'%}" width="150" height="150">
    <div class="container">
        <form role="form" name="frm" action="{% url 'student_login' %}"  method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="uname">Admission Number</label>
                <input class="form-control" type="text" id="uname" name="uname" placeholder="r***">
            </div>
             <div class="form-group">
                 <label for="uname">Password</label>
                 <input class="form-control" type="password" id="passwd" name="passwd">
             </div>
            <br><br>
            <button type="submit" class="btn btn-primary" id="bt" name="bt">Login</button>
            <button type="reset" class="btn btn-primary" id="rt" name="rt">Reset</button>
            <br/>

        </form>
    {{msg}}
    </div>
</center>
{% endblock %}
