{% extends 'myapp/admin_base.html' %}
{% load static %}
{% block title %}New Student Registration{% endblock %}
{% block body %}
<center>
    <h2>New Student Registration</h2>
	<div class="container">
    <form role="form" name="frm" action="{% url 'admin_student_details_add' %}" method="post">
        {% csrf_token %}

        <div class="form-group">
			<label for="fname">Name</label>
	        <input class="form-control" type="text"  id="fname" name="fname" placeholder="First name" required="required">
			<input class="form-control" type="text"  id="lname" name="lname" placeholder="Last name" required="required">
		</div>
	    <div class="form-group">
			<label for="rollno">Roll number</label>
	        <input type="text"  class="form-control" id="rollno" name="rollno">
		</div>
		<div class="form-group">
            <label>Gender :</label>
			<div class="custom-control custom-radio custom-control-inline">
  				<input type="radio" class="custom-control-input" id="gender1" name="gender" value="Male" checked>
  				<label class="custom-control-label" for="gender1">Male</label>
			</div>
			<div class="custom-control custom-radio custom-control-inline">
  				<input type="radio" class="custom-control-input" id="gender2" name="gender" value="Female">
  				<label class="custom-control-label" for="gender2">Female</label>
			</div>
		</div>
        <div class="form-group">
			<label for="dob">DOB</label>
	        <input type="date"  class="form-control" id="dob" name="dob">
		</div>

	    <div class="form-group">
			<label for="addr">Address</label>
	        <input class="form-control" type="text"  id="addr" name="addr" placeholder="Address" >
            <input type="text"  class="form-control" id="pin" name="pin" placeholder="pin" >
		</div>
	    <div class="form-group">
			<label for="contact">Contact</label>
	        <input type="text"  class="form-control" id="contact" name="contact" placeholder="Enter contact">
		</div>
		<div class="form-group">
			<label for="email">Email</label>
	        <input type="email" class="form-control" id="email" name="email" placeholder="Enter email id"></td>
		</div>
        <div class="form-group">
			<label for="pwd">password</label>
	        <input type="password" class="form-control" id="pwd" name="pwd"></td>
		</div>
		<br><br>
	    <button type="submit" class="btn btn-info" id="bt" name="bt">Register</button>
        <button type="reset" class="btn btn-info" id="rt" name="rt">Reset</button>
	    </table>
    </form>
	{{msg}}
	</div>
</center>
<script>
function loadSem() {
  var sel = document.getElementById('course_id');
  //alert(sel.value)
  var xhttp = new XMLHttpRequest();
  xhttp.onreadystatechange = function() {
    if ( this.status == 200) {
      document.getElementById("div2").innerHTML =
      this.responseText;
    }
  };
  xhttp.open("GET", "../myapp/sem_list_view?course_id="+sel.value, true);
  xhttp.send();
}
</script>
{% endblock %}
