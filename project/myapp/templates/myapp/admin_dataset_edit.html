{% extends 'myapp/admin_base.html' %}
{% load static %}
{% block title %}Data Set Update{% endblock %}
{% block body %}
<center>
    <h1>Data Set Edit</h1>
    <div class="container">
     <form role="form" name="frm" action="{% url 'admin_dataset_edit'%}" method="post">
        {% csrf_token %}
         <div class="form-group">
            <label for="type_name"> Name :</label>
            <input class="form-control" name="type_name" id="type_name" type="text"  value="{{type_name}}">
         </div>
         <div class="form-group">
            <label for="text"> Description :</label>
             <textarea class="form-control" name="text" id="text" >{{text}}</textarea>
         </div>
         <button type="submit"
        class="btn btn-info" id="bt" name="bt">Update</button>
        <button type="reset"
        class="btn btn-info" id="rt" name="rt">Clear</button>
         <input type="hidden" name="s_id" value="{{s_id}}">
    </form>
    </div>
    <h3>{{msg}}</h3>
</center>
{% endblock %}
