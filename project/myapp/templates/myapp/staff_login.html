{% extends 'myapp/base.html' %}
{% load static %}
{% block title %}Staff Login{% endblock %}
{% block body %}
<center>
     <h2><font color="#366092">Staff Login</font></h2>
        <img src="{% static 'myapp/images/staff.png'%}" width="150" height="150">

    <div class="container">
        <form role="form" name="frm" action="{% url 'staff_login' %}"  method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="uname">Staff Email</label>
                <input class="form-control" type="email" id="uname" name="uname">
            </div>
             <div class="form-group">
                 <label for="uname">Password</label>
                 <input class="form-control" type="password" id="passwd" name="passwd">
             </div>
            <br>
            <button type="submit" class="btn btn-primary" id="bt" name="bt">Login</button>
            <button type="reset" class="btn btn-primary" id="rt" name="rt">Reset</button>
            <br><br>

        </form>
    {{msg}}
    </div>
</center>
{% endblock %}
