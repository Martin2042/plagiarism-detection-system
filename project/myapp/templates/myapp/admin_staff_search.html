{% extends 'myapp/admin_base.html' %}
{% load static %}
{% block title %}Staff Search{% endblock %}
{% block body %}
<center>
    <h2><font color="#366092">Staff Search</font></h2>
    <div class="container">
    <form name="frm"  role="form" action="{% url 'admin_staff_search' %}" method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="app_name">Keyword</label>
                <input class="form-control" type="text" name="app_name" placeholder="keyword" id="app_name">
            </div>
            <div class="form-group">
                <label>Filter :</label>
			    <div class="custom-control custom-radio custom-control-inline">
  				    <input type="radio" class="custom-control-input" id="fname" name="filter" value="fname">
  				    <label class="custom-control-label" for="fname">First Name</label>
			    </div>
                <div class="custom-control custom-radio custom-control-inline">
  				    <input type="radio" class="custom-control-input" id="lname" name="filter" value="lname">
  				    <label class="custom-control-label" for="lname">Last Name</label>
			    </div>
            </div>
            <button type="submit" class="btn btn-info" id="bt" name="bt">Search</button>
            <button type="reset" class="btn btn-info" id="rt" name="rt">Reset</button>
        {{msg}}
        </form>
    </div>
</center>
{% endblock %}
