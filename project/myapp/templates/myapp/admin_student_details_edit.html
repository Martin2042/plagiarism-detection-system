{% extends 'myapp/admin_base.html' %}
{% load static %}
{% block title %}Student Details Edit{% endblock %}
{% block body %}
<center>
    <h2>Student Details Edit</h2>
	<div class="container">
    <form role="form" name="frm" action="{% url 'admin_student_details_edit' %}" method="post">
        {% csrf_token %}
		<div class="form-group">
			<label for="adm_no">Admission number</label>
	        <input type="text"  class="form-control"
				   id="adm_no" name="adm_no" value="{{student_obj.rollno}}" disabled>
		</div>
		<div class="form-group">
			<label for="fname">Name</label>
	        <input class="form-control" type="text"
				   id="fname" name="fname" value="{{student_obj.fname}}" required="required">
			<input class="form-control" type="text"
				   id="lname" name="lname" value="{{student_obj.lname}}" required="required">
		</div>
	    <div class="form-group">
            <label>Gender :</label>
			<div class="custom-control custom-radio custom-control-inline">
  				<input type="radio" class="custom-control-input" id="gender1" name="gender" value="Male" checked>
  				<label class="custom-control-label" for="gender1">Male</label>
			</div>
			<div class="custom-control custom-radio custom-control-inline">
  				<input type="radio" class="custom-control-input" id="gender2" name="gender" value="Female">
  				<label class="custom-control-label" for="gender2">Female</label>
			</div>
		</div>
        <div class="form-group">
			<label for="dob">DOB</label>
	        <input type="date"  class="form-control" id="dob" name="dob" value="{{student_obj.dob}}">
		</div>
		<div class="form-group">
			<label for="addr">Address</label>
			<textarea class="form-control"
					  id="addr" name="addr" placeholder="Address" >{{student_obj.addr}}</textarea>
            <input type="text"  class="form-control"
				   id="pin" name="pin" value="{{student_obj.pin}}" >
		</div>
	    <div class="form-group">
			<label for="contact">Contact</label>
	        <input type="text"  class="form-control"
				   id="contact" name="contact" value="{{student_obj.contact}}">
		</div>
		<div class="form-group">
			<label for="email">Email</label>
	        <input type="email" class="form-control"
				   id="email" name="email" value="{{student_obj.email}}"></td>
		</div>
        <br><br>
		<input type="hidden" name="e_id" value="{{e_id}}">
	    <button type="submit" class="btn btn-success" id="bt" name="bt">Update</button>
        <button type="reset" class="btn btn-info" id="rt" name="rt">Reset</button>
	    </table>
    </form>
	{{msg}}
	</div>
</center>
<script>
function loadSem() {
  var sel = document.getElementById('course_id');
  //alert(sel.value)
  var xhttp = new XMLHttpRequest();
  xhttp.onreadystatechange = function() {
    if ( this.status == 200) {
      document.getElementById("div2").innerHTML =
      this.responseText;
    }
  };
  xhttp.open("GET", "../myapp/sem_list_view?course_id="+sel.value, true);
  xhttp.send();
}
</script>
{% endblock %}
